# HAGI V4 — 24GB Google TPU config
# target_params: auto-computes all model sizes from optimal ratios
# Vocab: Gemma tokenizer (262146 tokens)

model:
  vocab_size: 262146
  target_params: 200000000      # ~75M non-embedding params (same as 8gb, 24GB has room for bigger batch)
  norm_eps: 1.0e-6

  algebra:
    blade_count: 8

  attention:
    rope_theta: 500000.0
    max_seq_len: 4096
    bidirectional: true
    fp16_attention: true
    fp32_rmsnorm: true

  gp2d:
    window: 1
    gate_init: -2.0
    use_whiteness_loss: true
    whiteness_weight: 0.01

  refinement:
    num_iterations: 4
    min_iterations: 1
    use_adaptive_halt: true
    halt_threshold: 0.9
    halt_threshold_start: 0.05
    halt_threshold_end: 0.001
    use_deep_supervision: true
    deep_supervision_decay: 0.1
    deep_supervision_weight: 0.1
    use_adaptive_ds_weight: true
    ds_ema_decay: 0.99
    use_entropy_adaptive_refinement: true
    entropy_low_threshold: 0.01
    entropy_high_threshold: 0.1
    entropy_low_iterations: 2
    entropy_high_iterations: 6
    use_gradient_checkpointing: true

  masking:
    mask_ratio: 0.3
    mask_token_id: 262145
    use_span_masking: true
    span_length: 3
    use_progressive: true

  hrm:
    h_stride: 4

  gdr:
    scalar_momentum: 0.8
    vector_momentum: 0.5
    bivector_momentum: 0.0
    trivector_momentum: 0.0
    use_grade_router: true
    grade_router_alpha: 0.01

  msa:
    max_slots: 4096
    slot_chunk_size: 4
    use_adaptive_chunk_size: true
    chunk_size_low_entropy: 8
    chunk_size_high_entropy: 2
    top_k: 6
    routing_key_dim: 64

  moe:
    num_experts: 4
    top_k: 1
    use_mod_skip: true
    alpha: 0.01
    use_grade_specialization: true
    grade_specialization_weight: 0.01

  cast:
    use_coherence: true
    coherence_gate_init: -5.0
    use_per_grade_coherence: true

train:
  max_steps: 150000
  warmup_steps: 5000
  learning_rate: 0.0004
  muon_lr: 0.02
  muon_momentum: 0.97
  muon_weight_decay: 0.5
  muon_ns_steps: 5
  weight_decay: 0.1
  precision: "bf16"
  grad_accum_steps: 2
  batch_size: 8
  seq_len: 1024
  w_ce: 1.0
  w_moe_aux: 0.01
  w_gdr_router: 0.01
  w_coherence: 0.001
  w_ib: 0.01
  ib_beta: 1.0
  w_whiteness: 0.01
  w_grade_specialization: 0.01
  use_two_phase_schedule: true
  two_phase_split: 0.5
  phase1_mask_ratio: 0.15
  phase2_mask_ratio: 0.35
  phase1_w_coherence: 0.0001
  phase2_w_coherence: 0.001
  phase1_gp2d_gate_init: -1.0
  phase2_gp2d_gate_init: -2.0
  log_grade_variance: true
  grade_log_interval: 100
  distill_enabled: true
  distill_teacher: "google/gemma-4-E2B-it"
  distill_embed_teacher: "google/t5gemma-2-1b-1b"
  distill_alpha_start: 0.5
  distill_alpha_end: 0.3
  distill_temperature: 2.0
  distill_temp_start: 4.0
  distill_temp_end: 1.0
  distill_use_temp_anneal: true
  distill_end_frac: 0.6
  distill_every: 2            # 24GB has room (kept at 2 for quality)
  tokenizer: "google/gemma-4-E2B-it"
  checkpoint_dir: "checkpoints"
  checkpoint_interval: 500
  checkpoint_keep_last: 3
  sequential_cycles: 3
  curriculum_enabled: true
  curriculum_stage2_start: 60000
  data_dtype: "uint32"
  data_dir: "data"

inference:
  temperature: 0.8
  top_k: 50
  min_tokens: 2
  block_size: 16
  refine_passes: 2
  repetition_penalty: 0.8
  repetition_window: 32
  max_iterations: 4
  max_new_tokens: 128
