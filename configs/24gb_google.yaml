# HAGI V7.1 — 24GB Google TPU config
# target_params: auto-computes all model sizes from optimal ratios
# Vocab: Gemma tokenizer (262146 tokens)

model:
  vocab_size: 262146
  target_params: 200000000
  norm_eps: 1.0e-6
  pilot_spacing: 8

  algebra:
    blade_count: 8

  attention:
    rope_theta: 500000.0
    max_seq_len: 4096
    bidirectional: true
    fp16_attention: true
    fp32_rmsnorm: true

  gp2d:
    window: 1
    gate_init: -2.0
    use_whiteness_loss: true
    whiteness_weight: 0.01
    use_multiscale: true
    multiscale_windows: [1, 4, 16]
    multiscale_gate_inits: [-2.0, -3.0, -4.0]
    use_interleave: true

  refinement:
    num_iterations: 4
    min_iterations: 1
    convergence_threshold: 0.01
    use_convergence_halt: true
    tanh_scale: 10.0

  masking:
    mask_ratio: 0.3
    mask_token_id: 262145
    use_span_masking: true
    span_length: 3
    use_progressive: true
    use_adaptive_erasure: true
    mask_embed_init: "max_entropy"
    adaptation_rate: 0.01

  msa:
    max_slots: 2048
    top_k: 6
    routing_key_dim: 64

  freq_coding:
    enabled: true
    n_modes_t: 16
    n_modes_h: 12
    complex_rank: 16

  multimodal:
    enabled: true
    num_modalities: 3
    modality_embed_std: 0.02
    modality_dropout_prob: 0.10
    modality_mask_ratios: [0.15, 0.30, 0.25]
    cross_freq_gate_init: 0.0
    cross_gp2d_gate_init: -3.0
    contrastive_temperature: 0.07
    contrastive_weight: 0.1

  image:
    patch_size: 16
    input_channels: 3
    max_image_patches: 1024

  audio:
    n_mels: 128
    max_audio_frames: 512

train:
  max_steps: 150000
  warmup_steps: 5000
  learning_rate: 0.0004
  muon_lr: 0.02
  muon_momentum: 0.97
  muon_weight_decay: 0.5
  muon_ns_steps: 5
  weight_decay: 0.1
  precision: "bf16"
  grad_accum_steps: 2
  batch_size: 8
  seq_len: 1024
  w_ce: 1.0
  w_whiteness: 0.01
  w_parity: 0.1
  w_extrinsic_info: 0.01
  w_efficiency: 0.001
  w_rate_distortion: 0.01
  w_contrastive: 0.1
  use_two_phase_schedule: true
  two_phase_split: 0.5
  phase1_mask_ratio: 0.15
  phase2_mask_ratio: 0.35
  distill_enabled: true
  distill_teacher: "google/gemma-4-E2B-it"
  distill_embed_teacher: "google/t5gemma-2-1b-1b"
  distill_alpha_start: 0.5
  distill_alpha_end: 0.3
  distill_temperature: 2.0
  distill_temp_start: 4.0
  distill_temp_end: 1.0
  distill_use_temp_anneal: true
  distill_end_frac: 0.6
  distill_every: 2
  tokenizer: "google/gemma-4-E2B-it"
  checkpoint_dir: "checkpoints"
  checkpoint_interval: 500
  checkpoint_keep_last: 3
  sequential_cycles: 3
  curriculum_enabled: true
  curriculum_stage2_start: 60000
  data_dtype: "uint32"
  data_dir: "data"

inference:
  temperature: 0.8
  top_k: 50
  min_tokens: 2
  block_size: 16
  refine_passes: 2
  repetition_penalty: 1.5
  repetition_window: 64
  max_iterations: 4
  max_new_tokens: 128
