# HAGI V24 — Canonical config (RTX 3070 8GB)
# V24 information-theoretic path (default ON): variational InformationBottleneck
# (§3.1) + PredictiveDecoder extrinsic-error highway (§3.2, reuses
# uncertainty.py for K=P/(P+R)) + HebbianBilinearFFN (hebbian-mlps §4.2).
# No AWGN self-noise, no LDPC parity over self-noise — the V8-V23 flaw is gone.
# Set model.v24.enabled: false to restore the V23 AWGN/LDPC SCS codec (ablation).

model:
  vocab_size: 49154
  target_params: 25000000
  target_nonembed_params: 25000000
  hidden_size: 384
  core_hidden_size: 192
  perception_layers: 4
  expression_layers: 4

  attention:
    max_seq_len: 4096
    head_dim: 64

  embeddings:
    factor_rank: 128

  gp2d:
    use_whiteness_loss: false

  codec:
    code_rate: 0.5

  refinement:
    num_iterations: 6
    min_iterations: 3
    use_convergence_halt: true
    convergence_threshold: 0.01

  masking:
    use_adaptive_erasure: true
    mask_embed_init: "max_entropy"

  # V23: Channel Quality Indicator — per-position channel quality feedback.
  # Drives adaptive AWGN sigma, BP gate strength, mask ratio.
  cqi:
    hidden_size: 384
    cqi_dim: 16
    sigma_min: 0.02
    sigma_max: 0.3

  # V23: EXIT chart convergence estimator — norm-ratio halt criterion.
  # Implements ‖extrinsic‖ < ε convergence halt (omc-codec-framing Mechanism 2).
  exit_chart:
    threshold: 0.01
    min_iterations: 1

  # V23: Learned per-position uncertainty — Bayes-optimal Mahalanobis gate.
  # Replaces fixed sigma_sq with learned variance for BP validation gate.
  uncertainty:
    hidden_size: 192

  # V23: Kalman filter — Bayes-optimal predict/update in BP loop.
  # K = P/(P+R) bounds measurement contribution in [0,1].
  # Q/R learnable, init sigmoid(-2.0) ≈ 0.12.
  kalman:
    init_process_noise: 0.0
    init_measurement_noise: 0.0
    covariance_floor: 0.000001

  # V23: HARQ buffer — extrinsic-only soft combining across BP iterations.
  # Stores deltas (NOT full state). MRC combining with uncertainty weighting.
  msa:
    max_slots: 256
    slot_chunk_size: 4
    top_k: 6
    routing_key_dim: 64
    n_kv_heads: 4
    head_dim: 64
    mla_compress_dim: 128
    mla_up_dim: 256

  # V23: HRM dual-component — z_H spatial (coarse) + z_L per-token (fine).
  # Extrinsic-only exchange between components (turbo decoder principle).
  hrm:
    h_state_dim: 128
    l_state_dim: 256
    h_stride: 4

  freq_coding:
    enabled: false

  # V24 information-theoretic path (default ON). See docs/ARCHITECTURE_V24.md.
  v24:
    enabled: true
    ib_beta: 0.001            # rate Lagrangian (β): small → fidelity-led
    distortion_weight: 1.0
    perception_weight: 0.01
    kl_free_bits: 0.5
    predictive_train_iterations: 2
    predictive_infer_iterations: 4
    predictive_convergence_threshold: 0.01
    predictive_update_hidden: 256
    use_kalman_blend: true    # reuse uncertainty.py (K=P/(P+R))
    hebbian_expansion: 4      # m = 4·H (hebbian-mlps paper default)

train:
  max_steps: 150000
  batch_size: 8
  seq_len: 512
  tokenizer: "HuggingFaceTB/SmolLM2-135M"
  eos_token_id: 0
  pad_token_id: 49152
  curriculum_stage2_start: 100000
  distill_teacher_hidden_size: 960
  # V24 rate-distortion aux weights (information bottleneck §3.1).
  w_v24_rate: 0.001
  w_v24_distortion: 1.0
  w_v24_perception: 0.01
  # V23: AWGN sigma schedule — forces LDPC to do real work.
  # SNR=4.0 (start) → SNR=11.1 (end), capacity stays above code_rate=0.5.
  awgn_sigma_start: 0.50
  awgn_sigma_end: 0.30

inference:
  repetition_penalty: 1.2
  no_repeat_ngram_size: 2
  max_new_tokens: 64
