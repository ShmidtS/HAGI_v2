# HAGI V7.1 — 8GB canonical config (RTX 3070)
# 5G NR-style codec SLM with Cl(3,0,0) geometric algebra.
# Set target_params — all model sizes auto-computed from optimal ratios.

model:
  vocab_size: 49154
  target_params: 17500000
  reasoning_layers: 7
  norm_eps: 1.0e-6
  pilot_spacing: 8

  algebra:
    blade_count: 8

  attention:
    rope_theta: 10000.0
    max_seq_len: 4096
    bidirectional: true
    fp16_attention: true
    fp32_rmsnorm: true

  gp2d:
    window: 1
    gate_init: -2.0
    use_whiteness_loss: true
    whiteness_weight: 0.01
    use_multiscale: true
    multiscale_windows: [1, 4, 16]
    multiscale_gate_inits: [-2.0, -3.0, -4.0]
    use_interleave: true

  refinement:
    num_iterations: 4
    min_iterations: 1
    convergence_threshold: 0.01
    use_convergence_halt: true
    tanh_scale: 10.0

  masking:
    mask_ratio: 0.30
    mask_token_id: 49153
    use_span_masking: true
    span_length: 3
    use_progressive: true
    use_adaptive_erasure: true
    mask_embed_init: "max_entropy"
    adaptation_rate: 0.01

  msa:
    max_slots: 2048
    top_k: 6
    routing_key_dim: 64

  freq_coding:
    enabled: true
    n_modes_t: 16
    n_modes_h: 12
    complex_rank: 16

  multimodal:
    enabled: true
    num_modalities: 3
    modality_embed_std: 0.02
    modality_dropout_prob: 0.10
    modality_mask_ratios: [0.15, 0.30, 0.25]
    cross_freq_gate_init: 0.0
    cross_gp2d_gate_init: -3.0
    contrastive_temperature: 0.07
    contrastive_weight: 0.1

  image:
    patch_size: 16
    input_channels: 3
    max_image_patches: 1024

  audio:
    n_mels: 128
    max_audio_frames: 512

train:
  max_steps: 150000
  warmup_steps: 5000
  learning_rate: 0.0003
  muon_lr: 0.02
  muon_momentum: 0.95
  muon_weight_decay: 0.5
  muon_ns_steps: 5
  weight_decay: 0.1
  precision: "bf16"
  grad_accum_steps: 2
  batch_size: 8
  seq_len: 512
  w_ce: 1.0
  w_whiteness: 0.01
  w_parity: 0.1
  w_extrinsic_info: 0.01
  w_efficiency: 0.001
  w_rate_distortion: 0.01
  w_contrastive: 0.1
  use_two_phase_schedule: true
  two_phase_split: 0.5
  phase1_mask_ratio: 0.15
  phase2_mask_ratio: 0.35
  use_continuous_anneal: true
  distill_enabled: true
  distill_teacher: "HuggingFaceTB/SmolLM2-360M"
  distill_embed_teacher: "HuggingFaceTB/SmolLM2-135M"
  distill_alpha_start: 0.5
  distill_alpha_end: 0.3
  distill_temperature: 2.0
  distill_temp_start: 4.0
  distill_temp_end: 1.0
  distill_use_temp_anneal: true
  distill_end_frac: 0.6
  distill_every: 2
  tokenizer: "HuggingFaceTB/SmolLM2-135M"
  checkpoint_dir: "checkpoints"
  checkpoint_interval: 500
  checkpoint_keep_last: 3
  sequential_cycles: 3
  curriculum_enabled: true
  curriculum_stage2_start: 100000

inference:
  temperature: 0.8
  top_k: 50
  min_tokens: 2
  block_size: 16
  refine_passes: 2
  repetition_penalty: 0.8
  repetition_window: 32
  no_repeat_ngram_size: 3
  max_iterations: 4
  max_new_tokens: 128
