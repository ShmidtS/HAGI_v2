# HAGI V22 — Canonical config (RTX 3070 8GB)
# Auto-derived from model architecture: H, C, layers, heads, n_checks,
# warmup_steps, learning_rate, checkpoint_interval, loss weights, AWGN sigma
# (0.40->0.15), entropy floor (0.5), distill params, inference defaults.
# Only hardware-specific, task-specific, and non-default params need to be set.

model:
  vocab_size: 49154
  target_params: 25000000
  target_nonembed_params: 25000000
  # Architecture overrides (auto_configure gives H=1928 for 25M; canonical
  # uses a smaller H for faster iteration on 8GB).
  hidden_size: 384
  core_hidden_size: 192
  perception_layers: 4
  expression_layers: 4
  reasoning_layers: 3

  attention:
    max_seq_len: 4096
    head_dim: 64

  embeddings:
    factor_rank: 128

  gp2d:
    use_whiteness_loss: false

  refinement:
    num_iterations: 6
    min_iterations: 3
    use_convergence_halt: false

  masking:
    use_adaptive_erasure: false

  freq_coding:
    enabled: false

train:
  max_steps: 150000
  batch_size: 8
  seq_len: 512
  tokenizer: "HuggingFaceTB/SmolLM2-135M"
  eos_token_id: 0
  pad_token_id: 49152
  # Non-default values (auto-derive would give 120000 for 150000 steps)
  curriculum_stage2_start: 100000
  # Non-default teacher hidden size (dataclass default is 576)
  distill_teacher_hidden_size: 960

inference:
  repetition_penalty: 1.2
  no_repeat_ngram_size: 2
  max_new_tokens: 64
