# HAGI V4 — 8GB canonical config (RTX 3070)
# Plane prediction SLM with Cl(3,0,0) geometric algebra.
# Set target_params — all model sizes auto-computed from optimal ratios.
# Explicit size overrides in YAML take precedence over auto-computed values.

model:
  vocab_size: 49154            # 49152 BPE + EOS + mask token
  target_params: 17500000      # ~17.5M non-embedding params → auto-computes H, C, layers, heads, grades
  reasoning_layers: 7          # override auto: more reasoning depth for iterative refinement
  norm_eps: 1.0e-6

  algebra:
    blade_count: 8              # Cl(3,0,0): 1 + 3 + 3 + 1 = 8 basis blades

  attention:
    rope_theta: 10000.0
    max_seq_len: 4096
    bidirectional: true         # V4: no causal mask (plane prediction)
    fp16_attention: true        # fp16 QKV for better softmax resolution
    fp32_rmsnorm: true          # fp32 variance for numerical stability

  gp2d:
    window: 1                   # temporal kernel: t-1, t, t+1 (3 positions)
    gate_init: -2.0             # sigmoid(-2) ≈ 0.12
    use_whiteness_loss: true    # penalize lag-1 autocorrelation of residual
    whiteness_weight: 0.01

  refinement:
    num_iterations: 4           # refinement iterations (train + inference)
    min_iterations: 1           # minimum before adaptive halting
    use_adaptive_halt: true     # per-token early stopping
    halt_threshold: 0.9
    halt_threshold_start: 0.05
    halt_threshold_end: 0.001
    use_deep_supervision: true
    deep_supervision_decay: 0.1
    deep_supervision_weight: 0.1
    use_adaptive_ds_weight: true
    ds_ema_decay: 0.99
    use_entropy_adaptive_refinement: true
    entropy_low_threshold: 0.01
    entropy_high_threshold: 0.1
    entropy_low_iterations: 2
    entropy_high_iterations: 6
    use_gradient_checkpointing: true

  masking:
    mask_ratio: 0.30          # 30% of tokens masked (progressive: 15% → 30%)
    mask_token_id: 49153      # vocab_size - 1
    use_span_masking: true    # span masking (contiguous blocks of 3)
    span_length: 3
    use_progressive: true

  msa:
    max_slots: 2048
    top_k: 6
    routing_key_dim: 64

train:
  max_steps: 150000
  warmup_steps: 5000
  learning_rate: 0.0003
  muon_lr: 0.02
  muon_momentum: 0.95
  muon_weight_decay: 0.5
  muon_ns_steps: 5
  weight_decay: 0.1
  precision: "bf16"
  grad_accum_steps: 2
  batch_size: 8
  seq_len: 512
  w_ce: 1.0
  w_moe_aux: 0.01
  w_gdr_router: 0.01
  w_coherence: 0.001
  w_ib: 0.01
  ib_beta: 1.0
  w_whiteness: 0.01
  w_grade_specialization: 0.01
  use_two_phase_schedule: true
  two_phase_split: 0.5
  phase1_mask_ratio: 0.15
  phase2_mask_ratio: 0.35
  phase1_w_coherence: 0.0001
  phase2_w_coherence: 0.001
  phase1_gp2d_gate_init: -1.0
  phase2_gp2d_gate_init: -2.0
  log_grade_variance: true
  grade_log_interval: 100
  distill_enabled: true
  distill_teacher: "HuggingFaceTB/SmolLM2-360M"
  distill_embed_teacher: "HuggingFaceTB/SmolLM2-135M"
  distill_alpha_start: 0.5
  distill_alpha_end: 0.3
  distill_temperature: 2.0
  distill_temp_start: 4.0
  distill_temp_end: 1.0
  distill_use_temp_anneal: true
  distill_end_frac: 0.6
  distill_every: 2
  tokenizer: "HuggingFaceTB/SmolLM2-135M"
  checkpoint_dir: "checkpoints"
  checkpoint_interval: 500
  checkpoint_keep_last: 3
  sequential_cycles: 3
  curriculum_enabled: true
  curriculum_stage2_start: 100000

inference:
  temperature: 0.8
  top_k: 50
  min_tokens: 2
  block_size: 16
  refine_passes: 2
  repetition_penalty: 0.8
  repetition_window: 32
  max_iterations: 4
  max_new_tokens: 128
