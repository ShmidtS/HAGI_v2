# HAGI V25 — Canonical ternary RD-channel config (RTX 3070 8GB)
#
# ARCHITECTURE_V25.md: ternary BitNet b1.58 backbone (the genuine channel) +
# variational InformationBottleneck (KL is the only rate) + PredictiveDecoder
# (extrinsic error highway + HEP) + multimodal source coding.
#
# No AWGN self-noise, no LDPC parity over self-noise, no Shannon capacity checks
# — the V8-V23 self-inflicted-channel flaw is structurally gone. The ternary
# quantization noise IS the channel; PredictiveDecoder denoises it; the IB KL
# rates it.
#
# Target: ~40M non-embedding params (ternary body counts at log2(3)/32 of FP32
# for deployable size; the FP masters train at full precision via Muon).

model:
  vocab_size: 49154
  target_params: 40000000
  target_nonembed_params: 40000000
  hidden_size: 384             # H: budget-matched (~39M nonembed vs 57.6M at H=512)
  core_hidden_size: 192        # C < H (invariant 1: real compression); C = H/2
  perception_layers: 8         # fallback when v25.context_layers <= 0
  expression_layers: 8         # fallback when v25.expression_layers <= 0

  attention:
    max_seq_len: 16224
    head_dim: 64               # auto-resolves to 8 heads x 48 (384 % 8 == 0)

  embeddings:
    factor_rank: 128

  multimodal:
    enabled: true                # V25 §6: multimodal source coding + early fusion

  # V23 legacy fields (unused on the V25 path; kept for ablation compatibility).
  gp2d:
    use_whiteness_loss: false
  codec:
    code_rate: 0.5               # irrelevant on V25 (no AWGN/LDPC) — kept for v23 ablation
  refinement:
    num_iterations: 6
    min_iterations: 3
    use_convergence_halt: true
    convergence_threshold: 0.01

  freq_coding:
    enabled: false

  # V24 dense path — disabled: V25 supersedes it.
  v24:
    enabled: false

  # V25 ternary RD-channel path (default ON).
  v25:
    enabled: true
    # Main-path-bypass fix: the variational IB + PredictiveDecoder are OUT of the
    # main LM path by default. Inserting them deadlocked from-scratch training
    # (step-1500 produced garbage: masked_ce ~11.2 = random). The IB stays as an
    # AUXILIARY KL-rate regularizer on h_ctx; the main path is context->expression
    # ->LM head (proven: dense-ternary learns masked_ce 11.4->0.39 in 200 steps).
    # Set bottleneck_in_path: true ONLY to reproduce the failed design (ablation).
    bottleneck_in_path: false
    use_ternary: true            # BitNet b1.58 on the 2D body masters
    # Variational bottleneck H->C (§3.2). KL[q(z|h)||N(0,I)] is the only rate.
    ib_beta: 0.001               # rate Lagrangian (small -> fidelity-led)
    distortion_weight: 1.0
    perception_weight: 0.01      # RDP third axis (NOW WIRED, was dead in V24)
    kl_free_bits: 0.5            # per-dim floor (prevent rate -> 0 collapse)
    logvar_clamp: [-10.0, 10.0]
    distortion_eps: 0.000001
    # Predictive decoder (§3.3): extrinsic error highway + HEP + Kalman blend.
    predictive_train_iterations: 2   # T_train < T_infer (invariant 4: V13 asymmetry)
    predictive_infer_iterations: 4
    predictive_convergence_threshold: 0.01
    predictive_update_hidden: 256
    use_kalman_blend: true       # K=P/(P+R) from uncertainty.py (correct role)
    hep_enabled: true            # Highway Error Propagation linear feedback V_t
    # Hebbian bilinear FFN: the only ternary body token/channel mixer (§5).
    hebbian_expansion: 4         # m = 4*H (hebbian-mlps paper default)
    hebbian_dropout: 0.0
    # Looped-depth ternary stacks (§8 DEPTH). HEP makes deep error highways viable.
    context_layers: 8
    expression_layers: 8
    multimodal_enabled: true     # V25 §6: multimodal source coding + early fusion
    moe_enabled: false           # dropped in V25 (§8 YAGNI — dead in V24)

train:
  max_steps: 150000
  batch_size: 2
  seq_len: 256
  tokenizer: "HuggingFaceTB/SmolLM2-135M"
  eos_token_id: 0
  pad_token_id: 49152
  curriculum_stage2_start: 100000
  distill_teacher_hidden_size: 960
  distill_enabled: false
  # V24/V25 rate-distortion aux weights (information bottleneck §3.1, §4).
  w_v24_rate: 0.001              # IB Lagrangian beta (the only code rate)
  w_v24_distortion: 1.0          # normalized RD reconstruction (beta-annealed 0->1)
  w_v24_perception: 0.01         # RDP perception axis (lag-1 residual autocorr)
  # V25 ternary-bias regularizer (§4). Default off — ternary is loss-free at
  # this scale (§10). Opt in by raising it above 0.
  w_ternary_bias: 0.0
  w_moe_load_balance: 0.01       # inert (moe_enabled=false)
  w_attn_entropy: 0.01           # channel-capacity safeguard (V22 collapse guard)
  attn_entropy_floor: 0.5
  # AWGN sigma schedule — irrelevant on V25 (no self-noise). Disable so the
  # loop does not inject noise. Values kept for V23 ablation compatibility.
  awgn_enabled: false
  awgn_sigma_start: 0.50
  awgn_sigma_end: 0.30

inference:
  repetition_penalty: 1.2
  no_repeat_ngram_size: 2
  max_new_tokens: 64
  max_iterations: 4              # predictive_infer_iterations
