# HAGI V22 — Google Cloud config (T4 16GB / V100 16GB)
# SCS codec LM with attention entropy stabilization + soft causal blending.
# Auto-derived from model architecture: warmup, lr (when not overridden),
# loss weights (when matching defaults), AWGN sigma (0.40->0.15), entropy
# floor (0.5), distill defaults, inference defaults, etc.
# V22: sigma 0.40->0.15, w_attn_entropy=0.01, attn_entropy_floor=0.5.

model:
  vocab_size: 262146
  target_params: 1000000000
  target_nonembed_params: 1000000000
  # Architecture overrides (auto_configure gives H=8920 for 1B; google
  # uses H=768 for T4/V100 memory constraints).
  hidden_size: 768
  core_hidden_size: 384
  perception_layers: 8
  expression_layers: 8
  reasoning_layers: 6

  attention:
    rope_theta: 500000.0
    max_seq_len: 3072
    head_dim: 64

  embeddings:
    factor_rank: 256

  refinement:
    num_iterations: 6
    min_iterations: 3

  masking:
    use_adaptive_erasure: false

  multimodal:
    enabled: true

train:
  max_steps: 200000
  warmup_steps: 8000
  learning_rate: 0.0003
  batch_size: 2
  seq_len: 1024
  w_whiteness: 0.01
  w_parity: 0.1
  w_correction_alignment: 0.001
  w_rate_distortion: 0.01
  w_contrastive: 0.1
  distill_teacher: "google/gemma-4-E2B-it"
  distill_teacher_hidden_size: 2048
  distill_embed_teacher: "google/t5gemma-2-1b-1b"
  distill_alpha_start: 0.1
  distill_alpha_end: 0.05
  tokenizer: "google/gemma-4-E2B-it"
  eos_token_id: 1
  pad_token_id: 0
  checkpoint_interval: 500
  curriculum_stage2_start: 120000

inference:
  repetition_penalty: 1.1
  repetition_window: 64
  no_repeat_ngram_size: 3
  max_iterations: 6
  max_new_tokens: 128
