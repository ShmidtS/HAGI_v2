# HAGI V11 — Google Cloud config (T4 16GB / V100 16GB)
# True Source-Channel Separation codec SLM with Cl(3,0,0) geometric algebra.
# V9-V11: ConvEmbedding (factorized source encoder + pulse-shaping),
# per-layer decoder weights (BP diversity), gradient clipping, code-rate
# fix, factor_rank=256, n_iter=6. Larger target than 8gb_canonical —
# takes advantage of 16GB VRAM.

model:
  vocab_size: 262146
  target_params: 1000000000
  target_nonembed_params: 1000000000
  norm_eps: 1.0e-6
  pilot_spacing: 8

  algebra:
    blade_count: 8

  attention:
    rope_theta: 500000.0
    max_seq_len: 3072
    bidirectional: true
    fp16_attention: true
    fp32_rmsnorm: true

  codec:
    code_rate: 0.5
    interleaver_mode: "qpp"
    exit_threshold: 0.01

  embeddings:
    trainable: true
    init: "normal"
    factor_rank: 256
    kernel_size: 5
    use_conv_embedding: true

  gp2d:
    use_whiteness_loss: true

  refinement:
    num_iterations: 6
    min_iterations: 3
    convergence_threshold: 0.01
    use_convergence_halt: true

  masking:
    mask_ratio: 0.3
    use_span_masking: true
    span_length: 3
    use_adaptive_erasure: false
    adaptation_rate: 0.01

  freq_coding:
    enabled: true
    use_lorentz: false

  multimodal:
    enabled: true
    num_modalities: 3
    modality_embed_std: 0.02
    modality_dropout_prob: 0.10
    modality_mask_ratios: [0.15, 0.30, 0.25]
    contrastive_temperature: 0.07
    contrastive_weight: 0.1

  image:
    patch_size: 16
    input_channels: 3
    max_image_patches: 1024

  audio:
    n_mels: 128
    max_audio_frames: 512

train:
  max_steps: 200000
  warmup_steps: 8000
  learning_rate: 0.0003
  muon_lr: 0.02
  muon_momentum: 0.95
  muon_weight_decay: 0.5
  muon_ns_steps: 5
  weight_decay: 0.1
  precision: "bf16"
  grad_accum_steps: 2
  max_grad_norm: 1.0
  batch_size: 2
  seq_len: 1024
  w_ce: 1.0
  w_whiteness: 0.01
  w_parity: 0.1
  w_correction_alignment: 0.001
  w_rate_distortion: 0.01
  w_contrastive: 0.1
  use_two_phase_schedule: true
  two_phase_split: 0.5
  phase1_mask_ratio: 0.15
  phase2_mask_ratio: 0.30
  phase3_mask_ratio: 0.50
  use_continuous_anneal: true
  distill_enabled: false
  distill_kl_enabled: false
  distill_teacher: "google/gemma-4-E2B-it"
  distill_embed_teacher: "google/t5gemma-2-1b-1b"
  distill_alpha_start: 0.1
  distill_alpha_end: 0.05
  distill_temperature: 2.0
  distill_temp_start: 4.0
  distill_temp_end: 1.0
  distill_use_temp_anneal: true
  distill_end_frac: 0.6
  awgn_enabled: true
  awgn_sigma_start: 0.005
  awgn_sigma_end: 0.0
  awgn_end_frac: 0.3
  freeze_embeddings: false
  tokenizer: "google/gemma-4-E2B-it"
  eos_token_id: 1
  pad_token_id: 0
  checkpoint_dir: "checkpoints"
  checkpoint_format_version: 3
  checkpoint_interval: 500
  checkpoint_keep_last: 3
  sequential_cycles: 3
  curriculum_enabled: true
  curriculum_stage2_start: 120000

inference:
  temperature: 0.8
  top_k: 50
  min_new_tokens: 2
  repetition_penalty: 1.1
  repetition_window: 64
  no_repeat_ngram_size: 3
  max_iterations: 6
  max_new_tokens: 128
