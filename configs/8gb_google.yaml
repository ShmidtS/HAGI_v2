# HAGI V23 — Google Cloud config (T4 16GB / V100 16GB)
# Full SCS codec with integrated modules: CQI, EXIT chart, LearnedUncertainty,
# Kalman filter, HARQ soft combining, HRM dual-component turbo loop,
# FreqCoding equalizer, MoE, WaterFilling, Lorentz, Contrastive.
# Training from scratch — all information-theoretic modules active.

model:
  vocab_size: 262146
  target_params: 1000000000
  target_nonembed_params: 1000000000
  hidden_size: 768
  core_hidden_size: 384
  perception_layers: 8
  expression_layers: 8

  attention:
    rope_theta: 500000.0
    max_seq_len: 3072
    head_dim: 64

  embeddings:
    factor_rank: 256

  gp2d:
    use_whiteness_loss: false

  codec:
    code_rate: 0.5

  refinement:
    num_iterations: 6
    min_iterations: 3
    use_convergence_halt: true
    convergence_threshold: 0.01

  masking:
    use_adaptive_erasure: true
    mask_embed_init: "max_entropy"

  cqi:
    hidden_size: 768
    cqi_dim: 16
    sigma_min: 0.02
    sigma_max: 0.3

  exit_chart:
    threshold: 0.01
    min_iterations: 1

  uncertainty:
    hidden_size: 384

  kalman:
    init_process_noise: 0.0
    init_measurement_noise: 0.0
    covariance_floor: 0.000001

  msa:
    max_slots: 256
    slot_chunk_size: 4
    top_k: 6
    routing_key_dim: 64
    n_kv_heads: 4
    head_dim: 64
    mla_compress_dim: 128
    mla_up_dim: 256

  hrm:
    h_state_dim: 128
    l_state_dim: 256
    h_stride: 4

  multimodal:
    enabled: true

train:
  max_steps: 200000
  warmup_steps: 8000
  learning_rate: 0.0003
  batch_size: 2
  seq_len: 1024
  w_whiteness: 0.01
  w_parity: 0.1
  w_correction_alignment: 0.001
  w_rate_distortion: 0.01
  w_contrastive: 0.1
  distill_teacher: "google/gemma-4-E2B-it"
  distill_teacher_hidden_size: 2048
  distill_embed_teacher: "google/t5gemma-2-1b-1b"
  distill_alpha_start: 0.1
  distill_alpha_end: 0.05
  tokenizer: "google/gemma-4-E2B-it"
  eos_token_id: 1
  pad_token_id: 0
  checkpoint_interval: 500
  curriculum_stage2_start: 120000
  awgn_sigma_start: 0.50
  awgn_sigma_end: 0.30

inference:
  repetition_penalty: 1.1
  repetition_window: 64
  no_repeat_ngram_size: 3
  max_iterations: 6
  max_new_tokens: 128
